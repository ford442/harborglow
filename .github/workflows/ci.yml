name: CI

# Merge gates for HarborGlow. See AGENTS.md § "CI merge gates" for which steps
# block merge vs report-only.
#
# History: UpgradeMenu.tsx broke production on main for two weeks because commits
# never ran `tsc`. The matrix below extends beyond typecheck to catch lint
# policy violations, Vite/Babel dev-transform failures, and production bundle
# regressions.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Dev-transform smoke (Babel pipeline)
        run: npm run smoke:dev-transform

      - name: Production build
        run: npm run build
