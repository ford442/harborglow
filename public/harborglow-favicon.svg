<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0a0a0a" rx="6"/>
  
  <!-- Gantry crane silhouette -->
  <g fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main horizontal beam -->
    <line x1="6" y1="12" x2="26" y2="12"/>
    
    <!-- Left support -->
    <line x1="8" y1="12" x2="8" y2="24"/>
    <line x1="6" y1="24" x2="10" y2="24"/>
    
    <!-- Right support -->
    <line x1="24" y1="12" x2="24" y2="24"/>
    <line x1="22" y1="24" x2="26" y2="24"/>
    
    <!-- Trolley (moving left-right) -->
    <rect x="14" y="9" width="4" height="4" rx="1" fill="#00d4aa" opacity="0.8"/>
    
    <!-- Cable down -->
    <line x1="16" y1="13" x2="16" y2="20"/>
    
    <!-- Hook -->
    <path d="M 14 20 Q 14 22 16 22 Q 18 22 18 20" stroke="#00d4aa" stroke-width="1.5" fill="none"/>
    <circle cx="16" cy="21" r="1" fill="#00d4aa"/>
  </g>
  
  <!-- Glow effect -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#00d4aa" stroke-width="0.5" opacity="0.3"/>
</svg>
